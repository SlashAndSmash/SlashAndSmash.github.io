<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Raleway:wght@400;600;700&family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
{{ $s := .Site.Data.site }}
{{ if $s }}
<style>
  :root {
    {{- with $s.header_footer_bg }}--dark: {{ . }};{{ end }}
    --heading-color: #2c3325;
    {{- with $s.header_footer_text }}--header-text: {{ . }};{{ end }}
    {{- with $s.header_footer_accent }}--gold: {{ . }};{{ end }}
  }
</style>
{{ end }}
