{{- /* PayPal.me link — simplest option, just a link to your PayPal.me page */ -}}
{{ $site := .Site.Data.site }}
<div class="paypal-widget">
  <h4>Pay with PayPal.me</h4>
  <p>Click the link below to pay via PayPal. Please include your <strong>name and class date</strong> as a note.</p>
  <a href="https://paypal.me/{{ $site.paypal_me }}/{{ strings.TrimLeft "£" $site.price }}" target="_blank" rel="noopener" class="btn btn-primary">Pay {{ $site.price }} via PayPal.me →</a>
</div>
