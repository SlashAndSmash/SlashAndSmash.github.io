{{- /* PayPal Hosted Button — uses a button ID created in your PayPal dashboard */ -}}
{{ $site := .Site.Data.site }}
{{ with $site.paypal_button_id }}
<div class="paypal-widget">
  <h4>Pay with PayPal</h4>
  <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
    <input type="hidden" name="cmd" value="_s-xclick">
    <input type="hidden" name="hosted_button_id" value="{{ . }}">
    <p>Click below to pay securely via PayPal.</p>
    <button type="submit" class="btn btn-primary">Pay {{ $site.price }} with PayPal</button>
  </form>
</div>
{{ end }}
