{{ define "main" }}
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-inner">
    <h1>{{ .Params.hero_title | default .Site.Title }}</h1>
    <p class="hero-tagline">{{ .Params.hero_subtitle }}</p>
    <a href="{{ .Params.hero_button_link | default "/book/" }}" class="btn btn-primary">{{ .Params.hero_button | default "Book a Class" }}</a>
  </div>
</section>
{{ with .Params.features }}
<div class="feature-strip">
  {{ range . }}
  <div class="feature-box">
    <h4>{{ . }}</h4>
  </div>
  {{ end }}
</div>
{{ end }}
<section class="page-content content-panel">
  {{ .Content }}
</section>
{{ end }}
