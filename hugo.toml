baseURL = "https://slashandsmash.github.io/"
languageCode = "en-gb"
title = "Slash & Smash — Stained Glass Classes"
disableKinds = ["taxonomy", "term"]

[module]
  [[module.mounts]]
    source = "pages"
    target = "content"
    files = ["**.md"]
  [[module.mounts]]
    source = "pages"
    target = "data"
    files = ["**.yaml"]
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"

[menus]
  [[menus.main]]
    name = "Home"
    pageRef = "/"
    weight = 1
  [[menus.main]]
    name = "Book a Class"
    pageRef = "/book/"
    weight = 2
  [[menus.main]]
    name = "FAQ"
    pageRef = "/faq/"
    weight = 3
  [[menus.main]]
    name = "Contact"
    pageRef = "/contact/"
    weight = 4
